<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2D4A38">
<title>Medidas Diarias</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  :root {
    --green-dark: #2D4A38; --green-mid: #4A7A5A; --green-light: #6B9E78; --green-pale: #E8F0EB;
    --cream: #F7F3ED; --cream2: #EDE8E0; --sand: #D9D0C3; --brown: #7A6B5A; --dark: #2A2420;
    --red: #C0675A; --white: #FFFFFF; --radius: 16px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08); --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
  }
  html,body { height:100%; background:var(--cream); font-family:'Nunito',sans-serif; color:var(--dark); overflow:hidden; }
  body { display:flex; flex-direction:column; max-width:480px; margin:0 auto; }

  /* HEADER */
  #header { background:var(--green-dark); padding:env(safe-area-inset-top,0) 0 0; flex-shrink:0; }
  #header-inner { padding:16px 20px 14px; display:flex; align-items:center; justify-content:space-between; }
  #header-title { font-family:'Playfair Display',serif; font-size:22px; color:#E8F4EC; font-weight:700; }
  #header-sub   { font-size:12px; color:#90B89A; margin-top:2px; text-transform:capitalize; }
  #btn-add-hdr  { background:var(--green-light); color:white; border:none; border-radius:22px; padding:10px 18px; font-size:14px; font-weight:800; font-family:'Nunito',sans-serif; box-shadow:0 2px 8px rgba(0,0,0,0.2); }

  /* NAV */
  #nav { background:#223830; display:flex; padding:6px 10px 8px; gap:4px; flex-shrink:0; }
  .nav-btn { flex:1; background:transparent; border:none; color:#7A9E85; padding:9px 2px; border-radius:12px; font-size:11.5px; font-weight:700; font-family:'Nunito',sans-serif; transition:all 0.18s; }
  .nav-btn.active { background:var(--green-dark); color:#E8F4EC; }

  /* BODY */
  #body { flex:1; overflow-y:auto; padding:16px 14px 100px; -webkit-overflow-scrolling:touch; }

  .sec-title { font-family:'Playfair Display',serif; font-size:17px; color:var(--green-dark); font-weight:700; margin-bottom:14px; }

  /* FORM */
  .form-label { font-size:12px; font-weight:800; color:var(--brown); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:8px; display:block; }
  .form-input  { width:100%; padding:13px 16px; border:1.5px solid var(--cream2); border-radius:14px; font-size:16px; color:var(--dark); background:var(--white); font-family:'Nunito',sans-serif; outline:none; transition:border-color 0.2s; }
  .form-input:focus { border-color:var(--green-mid); box-shadow:0 0 0 3px rgba(74,122,90,0.12); }
  .form-group { margin-bottom:15px; }
  textarea.form-input { resize:none; }
  select.form-input { appearance:auto; -webkit-appearance:auto; }

  /* DATE BAR */
  .date-bar { display:flex; align-items:center; gap:8px; background:var(--cream2); border-radius:14px; padding:10px 14px; margin-bottom:16px; }
  .date-bar label { font-size:12px; font-weight:800; color:var(--brown); text-transform:uppercase; letter-spacing:0.6px; white-space:nowrap; }
  .date-bar input[type=date] { border:none; background:transparent; font-size:14px; color:var(--dark); font-family:'Nunito',sans-serif; flex:1; outline:none; }

  /* GROUP LABEL */
  .group-label { font-size:11px; font-weight:800; color:var(--green-mid); text-transform:uppercase; letter-spacing:1px; padding:10px 2px 5px; }

  /* CAT GRID */
  #cat-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:7px; }
  .cat-chip { display:flex; align-items:center; gap:9px; padding:10px 11px; border-radius:13px; border:2px solid transparent; font-family:'Nunito',sans-serif; font-weight:700; transition:all 0.18s; cursor:pointer; background:var(--cream2); color:var(--brown); text-align:left; }
  .chip-icon  { font-size:19px; flex-shrink:0; }
  .chip-text  { flex:1; min-width:0; }
  .chip-label { font-size:11.5px; line-height:1.3; display:block; }
  .chip-unit  { font-size:10px; opacity:0.7; display:block; margin-top:1px; }
  .cat-chip.selected { color:white; }

  /* ENTRY CARD */
  .entry-card { background:var(--white); border-radius:var(--radius); padding:12px 11px; margin-bottom:9px; box-shadow:var(--shadow); display:flex; align-items:center; gap:9px; animation:slideUp 0.22s ease both; }
  .icon-bubble { width:40px; height:40px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:19px; flex-shrink:0; }
  .entry-info  { flex:1; min-width:0; }
  .entry-label { font-weight:800; font-size:13px; color:var(--dark); line-height:1.3; }
  .entry-note  { font-size:11px; color:#A09080; margin-top:2px; font-style:italic; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .entry-right { text-align:right; flex-shrink:0; }
  .entry-value { font-family:'Playfair Display',serif; font-size:19px; color:var(--green-dark); font-weight:700; }
  .entry-unit  { font-size:11px; color:#A09080; }
  .entry-time  { font-size:10px; color:#B0A090; margin-top:2px; }
  .entry-acts  { display:flex; flex-direction:column; gap:3px; flex-shrink:0; }
  .btn-icon    { background:none; border:none; font-size:15px; padding:4px 3px; line-height:1; cursor:pointer; }

  /* EMPTY */
  .empty { text-align:center; padding:55px 20px; }
  .empty-icon  { font-size:50px; margin-bottom:12px; }
  .empty-title { font-family:'Playfair Display',serif; font-size:18px; color:var(--brown); margin-bottom:6px; }
  .empty-sub   { font-size:13px; color:#B0A090; line-height:1.6; }

  /* BUTTONS */
  .btn-row { display:flex; gap:10px; margin-top:20px; }
  .btn-primary   { flex:1; background:var(--green-dark); color:white; border:none; border-radius:14px; padding:14px; font-size:15px; font-weight:800; font-family:'Nunito',sans-serif; transition:opacity 0.2s; }
  .btn-primary:disabled { opacity:0.38; }
  .btn-secondary { flex:1; background:var(--cream2); color:var(--brown); border:none; border-radius:14px; padding:14px; font-size:15px; font-weight:700; font-family:'Nunito',sans-serif; }
  .btn-danger    { background:var(--red) !important; }

  /* HISTORY */
  .day-block   { background:var(--white); border-radius:var(--radius); margin-bottom:10px; box-shadow:var(--shadow); overflow:hidden; }
  .day-header  { display:flex; align-items:center; justify-content:space-between; padding:13px 16px; cursor:pointer; }
  .day-title   { font-family:'Playfair Display',serif; font-size:15px; color:var(--green-dark); font-weight:700; text-transform:capitalize; }
  .day-count   { font-size:12px; color:#A09080; margin-top:2px; }
  .day-chips   { display:flex; gap:4px; flex-wrap:wrap; justify-content:flex-end; max-width:52%; }
  .mini-chip   { font-size:10px; padding:3px 7px; border-radius:20px; font-weight:700; }
  .day-entries { padding:0 10px 10px; display:none; }
  .day-entries.open { display:block; }
  .day-sub-entry { display:flex; align-items:center; gap:6px; padding:7px 2px; border-bottom:1px solid var(--cream2); }
  .day-sub-entry:last-child { border-bottom:none; }

  /* SUMMARY */
  #summary-txt { width:100%; font-family:monospace; font-size:12px; line-height:1.7; color:var(--dark); background:var(--cream); border:1.5px solid var(--sand); border-radius:14px; padding:14px; resize:none; -webkit-user-select:all; user-select:all; }
  .btn-copy { width:100%; background:var(--green-dark); color:white; border:none; border-radius:14px; padding:15px; font-size:16px; font-weight:800; font-family:'Nunito',sans-serif; margin-top:12px; }

  /* DIFF */
  .diff-up   { color:var(--red);       font-size:11px; font-weight:800; }
  .diff-down { color:var(--green-mid); font-size:11px; font-weight:800; }

  /* CAT MANAGE */
  .cat-manage-item { display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid var(--cream2); }
  .cat-manage-item:last-child { border-bottom:none; }

  /* ICON PICKER */
  .icon-picker { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:14px; }
  .icon-opt { width:40px; height:40px; border-radius:10px; border:2px solid transparent; background:var(--cream2); font-size:19px; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; justify-content:center; }
  .icon-opt.sel { border-color:var(--green-mid); background:var(--green-pale); }

  /* MODAL — slides up from bottom */
  #overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; align-items:flex-end; justify-content:center; z-index:200; }
  #overlay.open { display:flex; }
  #modal { background:var(--white); border-radius:22px 22px 0 0; padding:22px 18px 36px; width:100%; max-height:88vh; overflow-y:auto; box-shadow:var(--shadow-lg); animation:slideUp 0.28s ease both; -webkit-overflow-scrolling:touch; }
  #modal-title { font-family:'Playfair Display',serif; font-size:18px; color:var(--dark); margin-bottom:5px; }
  #modal-sub   { font-size:13px; color:var(--brown); margin-bottom:16px; line-height:1.5; }

  /* TOAST */
  #toast { position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--green-dark); color:white; padding:12px 22px; border-radius:24px; font-size:14px; font-weight:700; font-family:'Nunito',sans-serif; z-index:300; box-shadow:0 4px 20px rgba(0,0,0,0.3); transition:transform 0.3s cubic-bezier(.34,1.56,.64,1),opacity 0.3s; opacity:0; white-space:nowrap; pointer-events:none; }
  #toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

  @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div id="header">
  <div id="header-inner">
    <div>
      <div id="header-title">📏 Mis Medidas</div>
      <div id="header-sub"></div>
    </div>
    <button id="btn-add-hdr" onclick="showView('add')">＋ Registrar</button>
  </div>
</div>

<div id="nav">
  <button class="nav-btn active" onclick="showView('home')"    data-view="home">📋 Hoy</button>
  <button class="nav-btn"        onclick="showView('history')" data-view="history">📅 Historial</button>
  <button class="nav-btn"        onclick="showView('summary')" data-view="summary">📤 Resumen</button>
  <button class="nav-btn"        onclick="showView('cats')"    data-view="cats">⚙️ Categorías</button>
</div>

<div id="body"></div>

<div id="overlay" onclick="closeModal()">
  <div id="modal" onclick="event.stopPropagation()">
    <div id="modal-title"></div>
    <div id="modal-sub"></div>
    <div id="modal-content"></div>
  </div>
</div>
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════
// CATEGORÍAS PREDEFINIDAS
// ═══════════════════════════════════════════════
const DEFAULT_CATS = [
  // ── Composición corporal
  {id:"agua",    group:"Composición corporal",  label:"Agua",                                       unit:"%",  icon:"💧", color:"#4A90B8"},
  {id:"gv",      group:"Composición corporal",  label:"Grasa visceral",                             unit:"%",  icon:"📉", color:"#C67B5C"},
  {id:"musc_kg", group:"Composición corporal",  label:"Músculos",                                   unit:"kg", icon:"💪", color:"#5A8A6A"},
  {id:"mme_pct", group:"Composición corporal",  label:"Masa muscular esquelética",                  unit:"%",  icon:"📊", color:"#6B7FA1"},
  {id:"mme_kg",  group:"Composición corporal",  label:"Peso masa muscular esquelética",             unit:"kg", icon:"💪", color:"#7B8FA1"},
  {id:"prot",    group:"Composición corporal",  label:"Proteína",                                   unit:"%",  icon:"🥩", color:"#A0785A"},
  {id:"grasa",   group:"Composición corporal",  label:"% Grasa Corporal",                           unit:"%",  icon:"📈", color:"#C4956A"},
  // ── Circunferencias
  {id:"bicep_d", group:"Circunferencias",       label:"Bícep Der.",                                 unit:"cm", icon:"💪", color:"#5A8A7A"},
  {id:"bicep_i", group:"Circunferencias",       label:"Bícep Izq.",                                 unit:"cm", icon:"💪", color:"#5A8A7A"},
  {id:"cadera",  group:"Circunferencias",       label:"Cadera a la altura de la pelvis",            unit:"cm", icon:"📐", color:"#9B7B9B"},
  {id:"cin_arr", group:"Circunferencias",       label:"Cintura 2 dedos arriba del ombligo",         unit:"cm", icon:"🎯", color:"#C67B5C"},
  {id:"cin_omb", group:"Circunferencias",       label:"Cintura desde el ombligo",                   unit:"cm", icon:"🎯", color:"#B86A50"},
  {id:"cuello",  group:"Circunferencias",       label:"Cuello",                                     unit:"cm", icon:"📏", color:"#7A8A9A"},
  {id:"hombros", group:"Circunferencias",       label:"Hombros medidos desde el frente",            unit:"cm", icon:"📐", color:"#7B8FA1"},
  {id:"muslo_d", group:"Circunferencias",       label:"Muslo Der. desde lo más ancho",              unit:"cm", icon:"🦵", color:"#A08B6B"},
  {id:"muslo_i", group:"Circunferencias",       label:"Muslo Izq. desde lo más ancho",              unit:"cm", icon:"🦵", color:"#A08B6B"},
  {id:"pant_d",  group:"Circunferencias",       label:"Pantorrilla Der.",                           unit:"cm", icon:"🦵", color:"#6B9B7B"},
  {id:"pant_i",  group:"Circunferencias",       label:"Pantorrilla Izq.",                           unit:"cm", icon:"🦵", color:"#6B9B7B"},
  {id:"pecho",   group:"Circunferencias",       label:"Pecho medido desde el pezón",                unit:"cm", icon:"📏", color:"#A0785A"},
  // ── Longitudes corporales
  {id:"l_cab",   group:"Longitudes corporales", label:"Largo hombro al inicio de la cabeza",        unit:"cm", icon:"📏", color:"#7A6B9A"},
  {id:"l_tor",   group:"Longitudes corporales", label:"Largo torso: hombro al inicio de pelvis",    unit:"cm", icon:"📏", color:"#7A8A6A"},
  {id:"l_pie",   group:"Longitudes corporales", label:"Largo desde pelvis a la planta del pie",     unit:"cm", icon:"📏", color:"#8A7A5A"},
  // ── Peso general
  {id:"peso",    group:"Peso general",          label:"Peso",                                       unit:"kg", icon:"⚖️", color:"#5A8A6A"},
];

const UNITS = ["kg","lb","cm","in","%","g","L","ml"];
const ICONS = ["📏","⚖️","💪","🦵","🎯","📊","📐","📉","📈","❤️","💧","🔵","🟢","⭕","🏃","🧘","🍎","💊","🩺","🌡️","🥩","⭐","🔴","🟡"];

let categories = JSON.parse(localStorage.getItem("mdc_cats")    || "null") || DEFAULT_CATS;
let entries    = JSON.parse(localStorage.getItem("mdc_entries") || "{}");

function saveCats()    { localStorage.setItem("mdc_cats",    JSON.stringify(categories)); }
function saveEntries() { localStorage.setItem("mdc_entries", JSON.stringify(entries)); }

// ═══════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════
function today()    { return new Date().toISOString().split("T")[0]; }
function timeNow()  { return new Date().toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"}); }
function cat(id)    { return categories.find(c=>c.id===id)||{}; }
function allDays()  { return Object.keys(entries).sort((a,b)=>b.localeCompare(a)); }

function fmtDate(s) {
  return new Date(s+"T12:00:00").toLocaleDateString("es-MX",{weekday:"long",day:"numeric",month:"long"});
}
function fmtDateShort(s) {
  return new Date(s+"T12:00:00").toLocaleDateString("es-MX",{day:"numeric",month:"short"});
}
function groupedCats() {
  const g={};
  categories.forEach(c=>{ const k=c.group||"Sin grupo"; if(!g[k]) g[k]=[]; g[k].push(c); });
  return g;
}

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
let toastTimer;
function showToast(msg, danger=false){
  const t=document.getElementById("toast");
  t.textContent=msg; t.style.background=danger?"#C0675A":"#2D4A38";
  t.classList.add("show"); clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"),2400);
}

// ═══════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════
function openModal(title,sub,html){
  document.getElementById("modal-title").textContent  = title;
  document.getElementById("modal-sub").textContent    = sub;
  document.getElementById("modal-content").innerHTML  = html;
  document.getElementById("overlay").classList.add("open");
}
function closeModal(){ document.getElementById("overlay").classList.remove("open"); }

// ═══════════════════════════════════════════════
// ROUTING
// ═══════════════════════════════════════════════
let currentView  = "home";
let selectedDate = today();
let addState     = {};
let newCatState  = {icon:"📏",label:"",unit:"cm",group:""};

function showView(v){
  currentView=v;
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.toggle("active",b.dataset.view===v));
  render();
}
function render(){
  const body=document.getElementById("body");
  body.innerHTML="";
  ({home:renderHome,add:renderAdd,history:renderHistory,summary:renderSummary,cats:renderCats}[currentView]||renderHome)(body);
}

// ═══════════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════════
function renderHome(el){
  el.innerHTML=`
    <div class="date-bar">
      <label>📅 Día:</label>
      <input type="date" id="date-pick" value="${selectedDate}" max="${today()}">
    </div>
    <div id="home-entries"></div>`;
  document.getElementById("date-pick").addEventListener("change",function(){
    selectedDate=this.value; renderHomeEntries();
  });
  renderHomeEntries();
}

function renderHomeEntries(){
  const cont=document.getElementById("home-entries"); if(!cont) return;
  const list=entries[selectedDate]||[];
  if(!list.length){
    cont.innerHTML=`<div class="empty">
      <div class="empty-icon">📏</div>
      <div class="empty-title">Sin registros este día</div>
      <div class="empty-sub">Presiona <b>+ Registrar</b> para agregar tus medidas</div>
    </div>`; return;
  }
  let html=`<div class="sec-title">${list.length} medida${list.length!==1?"s":""} registrada${list.length!==1?"s":""}</div>`;
  list.forEach(e=>{ html+=entryCardHtml(e,selectedDate); });
  cont.innerHTML=html;
}

function entryCardHtml(e,day){
  const col=e.color||"#888";
  return `<div class="entry-card">
    <div class="icon-bubble" style="background:${col}22;color:${col}">${e.icon}</div>
    <div class="entry-info">
      <div class="entry-label">${e.label}</div>
      ${e.note?`<div class="entry-note">${e.note}</div>`:""}
    </div>
    <div class="entry-right">
      <div class="entry-value">${e.value}<span class="entry-unit"> ${e.unit}</span></div>
      <div class="entry-time">${e.time}</div>
    </div>
    <div class="entry-acts">
      <button class="btn-icon" onclick="editEntry('${day}',${e.id})" title="Editar">✏️</button>
      <button class="btn-icon" onclick="confirmDelete('${day}',${e.id})" title="Eliminar" style="color:#D4C8BE">✕</button>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════
// ADD  — con selector de fecha y hora
// ═══════════════════════════════════════════════
function renderAdd(el){
  addState={catId:"",value:"",note:"",date:selectedDate,time:timeNow()};
  const groups=groupedCats();
  let gridHtml="";
  Object.entries(groups).forEach(([g,cats])=>{
    gridHtml+=`<div class="group-label">${g}</div>`;
    cats.forEach(c=>{
      gridHtml+=`<button class="cat-chip" data-id="${c.id}" onclick="selectCat('${c.id}')"
        style="background:${c.color}22;color:${c.color}">
        <span class="chip-icon">${c.icon}</span>
        <span class="chip-text"><span class="chip-label">${c.label}</span><span class="chip-unit">${c.unit}</span></span>
      </button>`;
    });
  });

  el.innerHTML=`
    <div class="sec-title">Nueva Medida</div>

    <div class="form-group">
      <label class="form-label">📅 Fecha del registro</label>
      <input type="date" class="form-input" id="add-date" value="${addState.date}" max="${today()}"
        onchange="addState.date=this.value">
    </div>

    <label class="form-label">Selecciona la medida</label>
    <div id="cat-grid">${gridHtml}</div>

    <div id="add-value-area" style="display:none;margin-top:18px">
      <div class="form-group">
        <label class="form-label" id="val-label">Valor</label>
        <input type="number" class="form-input" id="inp-value" placeholder="Ej. 75.5" step="0.1" min="0"
          oninput="addState.value=this.value;document.getElementById('btn-save').disabled=!this.value.trim()">
      </div>
      <div class="form-group">
        <label class="form-label">🕐 Hora <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px">(se registra automáticamente, puedes cambiarla)</span></label>
        <input type="time" class="form-input" id="inp-time" onchange="addState.time=this.value">
      </div>
      <div class="form-group">
        <label class="form-label">Nota (opcional)</label>
        <textarea class="form-input" id="inp-note" rows="2"
          placeholder="Ej. En ayunas, después de entrenar..."
          oninput="addState.note=this.value"></textarea>
      </div>
      <div class="btn-row">
        <button class="btn-secondary" onclick="showView('home')">Cancelar</button>
        <button class="btn-primary" id="btn-save" onclick="saveEntry()" disabled>Guardar</button>
      </div>
    </div>`;

  // set time input after render
  const ti=document.getElementById("inp-time");
  if(ti){ ti.value=addState.time; }
}

function selectCat(id){
  addState.catId=id;
  const c=cat(id);
  document.querySelectorAll(".cat-chip").forEach(b=>{
    const bc=cat(b.dataset.id);
    const sel=b.dataset.id===id;
    b.style.background=sel?(bc.color||"#888"):(bc.color||"#888")+"22";
    b.style.color=sel?"white":(bc.color||"#888");
  });
  document.getElementById("val-label").textContent=`Valor (${c.unit})`;
  const area=document.getElementById("add-value-area");
  area.style.display="block";
  document.getElementById("inp-value").focus();
}

function saveEntry(){
  if(!addState.catId||!addState.value) return;
  const c=cat(addState.catId);
  const day=addState.date||today();
  const time=document.getElementById("inp-time")?.value||timeNow();
  const entry={
    id:Date.now(), catId:addState.catId, label:c.label, icon:c.icon, color:c.color,
    value:parseFloat(addState.value), unit:c.unit,
    note:(document.getElementById("inp-note")?.value||"").trim(),
    time, ts:new Date().toISOString(),
  };
  if(!entries[day]) entries[day]=[];
  entries[day].push(entry);
  entries[day].sort((a,b)=>a.time.localeCompare(b.time));
  saveEntries();
  selectedDate=day;
  showView("home");
  showToast("✅ Medida guardada");
}

// ═══════════════════════════════════════════════
// EDIT ENTRY
// ═══════════════════════════════════════════════
function editEntry(day,id){
  const e=(entries[day]||[]).find(x=>x.id===id); if(!e) return;
  openModal(`Editar: ${e.label}`,`${fmtDateShort(day)} · ${e.time}`,
    `<div class="form-group">
       <label class="form-label">Valor (${e.unit})</label>
       <input type="number" class="form-input" id="ee-value" value="${e.value}" step="0.1" min="0">
     </div>
     <div class="form-group">
       <label class="form-label">Hora</label>
       <input type="time" class="form-input" id="ee-time" value="${e.time}">
     </div>
     <div class="form-group">
       <label class="form-label">Nota (opcional)</label>
       <textarea class="form-input" id="ee-note" rows="2">${e.note||""}</textarea>
     </div>
     <div class="btn-row">
       <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
       <button class="btn-primary" onclick="doEditEntry('${day}',${id})">Guardar cambios</button>
     </div>`);
}

function doEditEntry(day,id){
  const val=parseFloat(document.getElementById("ee-value").value);
  const time=document.getElementById("ee-time").value;
  const note=document.getElementById("ee-note").value.trim();
  if(isNaN(val)){ showToast("⚠️ Valor inválido",true); return; }
  entries[day]=(entries[day]||[]).map(e=>e.id===id?{...e,value:val,time,note}:e);
  entries[day].sort((a,b)=>a.time.localeCompare(b.time));
  saveEntries(); closeModal();
  showToast("✅ Registro actualizado");
  if(currentView==="home") renderHomeEntries();
  else renderHistory(document.getElementById("body"));
}

// ═══════════════════════════════════════════════
// DELETE ENTRY
// ═══════════════════════════════════════════════
function confirmDelete(day,id){
  openModal("¿Eliminar registro?","Esta acción no se puede deshacer.",
    `<div class="btn-row">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary btn-danger" onclick="deleteEntry('${day}',${id})">Eliminar</button>
    </div>`);
}
function deleteEntry(day,id){
  entries[day]=(entries[day]||[]).filter(e=>e.id!==id);
  if(!entries[day].length) delete entries[day];
  saveEntries(); closeModal();
  showToast("🗑 Entrada eliminada",true);
  if(currentView==="home") renderHomeEntries();
  else renderHistory(document.getElementById("body"));
}

// ═══════════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════════
function renderHistory(el){
  const days=allDays();
  let html=`<div class="sec-title">Historial completo</div>`;
  if(!days.length){
    html+=`<div class="empty"><div class="empty-icon">📅</div><div class="empty-title">Sin registros aún</div><div class="empty-sub">Comienza registrando tus medidas de hoy</div></div>`;
  } else {
    days.forEach(day=>{
      const list=entries[day]||[];
      const chips=list.slice(0,3).map(e=>{
        const col=(cat(e.catId).color||"#888");
        return `<span class="mini-chip" style="background:${col}22;color:${col}">${e.icon}${e.value}${e.unit}</span>`;
      }).join("");
      const extra=list.length>3?`<span class="mini-chip" style="background:#EDE8E0;color:#7A6B5A">+${list.length-3}</span>`:"";
      html+=`<div class="day-block">
        <div class="day-header" onclick="toggleDay('${day}')">
          <div>
            <div class="day-title">${fmtDate(day)}</div>
            <div class="day-count">${list.length} medida${list.length!==1?"s":""} · toca para ver</div>
          </div>
          <div class="day-chips">${chips}${extra}</div>
        </div>
        <div class="day-entries" id="day-${day}">
          ${list.map(e=>`<div class="day-sub-entry">
            <span style="font-size:18px">${e.icon}</span>
            <div style="flex:1;min-width:0">
              <div style="font-size:12px;font-weight:800;color:var(--dark);line-height:1.3">${e.label}</div>
              ${e.note?`<div style="font-size:10px;color:#A09080;font-style:italic">${e.note}</div>`:""}
            </div>
            <span style="font-family:'Playfair Display',serif;font-size:15px;color:var(--green-dark);font-weight:700;white-space:nowrap">${e.value}<span style="font-size:10px;color:#A09080;font-family:'Nunito',sans-serif"> ${e.unit}</span></span>
            <span style="font-size:10px;color:#B0A090;margin:0 3px;white-space:nowrap">${e.time}</span>
            <button class="btn-icon" onclick="editEntry('${day}',${e.id})" style="font-size:13px">✏️</button>
            <button class="btn-icon" onclick="confirmDelete('${day}',${e.id})" style="font-size:13px;color:#D4C8BE">✕</button>
          </div>`).join("")}
        </div>
      </div>`;
    });
  }
  el.innerHTML=html;
}

function toggleDay(day){
  const el=document.getElementById("day-"+day); if(el) el.classList.toggle("open");
}

// ═══════════════════════════════════════════════
// SUMMARY
// ═══════════════════════════════════════════════
function renderSummary(el){
  const days=allDays();
  let txt="📋 DIARIO DE MEDIDAS\n";
  txt+=`Exportado: ${new Date().toLocaleDateString("es-MX",{day:"numeric",month:"long",year:"numeric"})}\n`;
  txt+="─".repeat(40)+"\n\n";
  if(!days.length){ txt+="(Sin registros aún)\n"; }
  else days.forEach(day=>{
    txt+=`📅 ${fmtDate(day).toUpperCase()}\n`;
    (entries[day]||[]).forEach(e=>{
      txt+=`  ${e.icon} ${e.label}: ${e.value} ${e.unit}`;
      if(e.note) txt+=`  — ${e.note}`;
      txt+=`  (${e.time})\n`;
    });
    txt+="\n";
  });

  let html=`<div class="sec-title">Resumen para Nutriólogo</div>
    <p style="font-size:13px;color:var(--brown);margin-bottom:12px;line-height:1.6">Copia este texto y envíalo por WhatsApp, correo o mensaje.</p>
    <textarea id="summary-txt" rows="14">${txt}</textarea>
    <button class="btn-copy" onclick="copySummary()">📋 Copiar al portapapeles</button>`;

  if(days.length){
    html+=`<div class="sec-title" style="margin-top:26px">Última medida por categoría</div>`;
    categories.forEach(c=>{
      const allE=days.flatMap(d=>(entries[d]||[]).filter(e=>e.catId===c.id)).sort((a,b)=>new Date(b.ts)-new Date(a.ts));
      if(!allE.length) return;
      const latest=allE[0], prev=allE[1];
      const diff=prev?(latest.value-prev.value):null;
      const diffHtml=diff!==null
        ?`<span class="${diff<0?"diff-down":diff>0?"diff-up":""}">${diff>0?"▲":diff<0?"▼":"—"} ${Math.abs(diff).toFixed(1)}${latest.unit}</span>`:"";
      const dayKey=latest.ts.split("T")[0];
      html+=`<div class="entry-card" style="margin-bottom:8px">
        <div class="icon-bubble" style="background:${c.color}22;color:${c.color}">${c.icon}</div>
        <div class="entry-info">
          <div class="entry-label">${c.label}</div>
          <div class="entry-note">${fmtDateShort(dayKey)} · ${latest.time}</div>
        </div>
        <div class="entry-right">
          <div class="entry-value">${latest.value}<span class="entry-unit"> ${latest.unit}</span></div>
          ${diffHtml}
        </div>
      </div>`;
    });
  }
  el.innerHTML=html;
}

function copySummary(){
  const txt=document.getElementById("summary-txt");
  if(navigator.clipboard){ navigator.clipboard.writeText(txt.value).then(()=>showToast("📋 Copiado al portapapeles")); }
  else { txt.select(); document.execCommand("copy"); showToast("📋 Copiado al portapapeles"); }
}

// ═══════════════════════════════════════════════
// CATS MANAGER
// ═══════════════════════════════════════════════
function renderCats(el){
  const groups=groupedCats();
  let html=`<div class="sec-title">Gestionar Categorías</div>`;

  Object.entries(groups).forEach(([g,cats])=>{
    html+=`<div class="group-label">${g}</div>
      <div style="background:var(--white);border-radius:var(--radius);padding:10px 14px;margin-bottom:10px;box-shadow:var(--shadow)">`;
    cats.forEach(c=>{
      html+=`<div class="cat-manage-item">
        <span style="font-size:20px">${c.icon}</span>
        <div style="flex:1;min-width:0">
          <div style="font-weight:800;font-size:13px;color:var(--dark);line-height:1.3">${c.label}</div>
          <div style="font-size:11px;color:#A09080">${c.unit}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <button onclick="editCat('${c.id}')" style="background:var(--green-pale);border:none;border-radius:9px;padding:5px 9px;font-size:12px;font-weight:800;color:var(--green-dark);font-family:'Nunito',sans-serif">✏️ Editar</button>
          <button class="btn-icon" onclick="deleteCat('${c.id}')" style="color:var(--red);font-size:19px">🗑</button>
        </div>
      </div>`;
    });
    html+=`</div>`;
  });

  // Crear nueva
  const allGroups=[...new Set(categories.map(c=>c.group||"Sin grupo"))];
  html+=`<div class="sec-title" style="margin-top:4px">Nueva categoría</div>
    <div style="background:var(--white);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)">
      <label class="form-label">Ícono</label>
      <div class="icon-picker" id="ipnew">
        ${ICONS.map(ic=>`<button class="icon-opt${newCatState.icon===ic?" sel":""}" onclick="pickIconNew('${ic}')">${ic}</button>`).join("")}
      </div>
      <div class="form-group">
        <label class="form-label">Nombre</label>
        <input type="text" class="form-input" id="nc-label" placeholder="Ej. Antebrazo derecho" value="${newCatState.label}" oninput="newCatState.label=this.value">
      </div>
      <div class="form-group">
        <label class="form-label">Unidad</label>
        <select class="form-input" id="nc-unit" onchange="newCatState.unit=this.value">
          ${UNITS.map(u=>`<option value="${u}"${u===newCatState.unit?" selected":""}>${u}</option>`).join("")}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Grupo</label>
        <input type="text" class="form-input" id="nc-group" list="glist-new" placeholder="Ej. Composición corporal" value="${newCatState.group}" oninput="newCatState.group=this.value">
        <datalist id="glist-new">${allGroups.map(g=>`<option value="${g}">`).join("")}</datalist>
      </div>
      <button class="btn-primary" onclick="addCat()" style="width:100%">Crear categoría</button>
    </div>`;

  el.innerHTML=html;
}

function pickIconNew(ic){
  newCatState.icon=ic;
  document.querySelectorAll("#ipnew .icon-opt").forEach(b=>b.classList.toggle("sel",b.textContent===ic));
}

function addCat(){
  const label=document.getElementById("nc-label")?.value.trim();
  const unit =document.getElementById("nc-unit")?.value||"cm";
  const group=document.getElementById("nc-group")?.value.trim()||"Sin grupo";
  if(!label){ showToast("⚠️ Escribe un nombre",true); return; }
  const palette=["#5A8A6A","#7A8A9A","#A08B6B","#9B7B9B","#C4956A","#7B8FA1","#C67B5C","#4A90B8"];
  const color=palette[categories.length%palette.length];
  categories.push({id:`c_${Date.now()}`,label,unit,icon:newCatState.icon,color,group});
  saveCats(); newCatState={icon:"📏",label:"",unit:"cm",group:""};
  showToast("✅ Categoría creada");
  renderCats(document.getElementById("body"));
}

function editCat(id){
  const c=categories.find(x=>x.id===id); if(!c) return;
  const allGroups=[...new Set(categories.map(x=>x.group||"Sin grupo"))];
  const icHtml=ICONS.map(ic=>`<button class="icon-opt${c.icon===ic?" sel":""}"
    onclick="this.parentNode.querySelectorAll('.icon-opt').forEach(b=>b.classList.remove('sel'));this.classList.add('sel');document.getElementById('ec-icon').value='${ic}'">${ic}</button>`).join("");
  openModal("Editar categoría",c.label,
    `<input type="hidden" id="ec-icon" value="${c.icon}">
     <label class="form-label">Ícono</label>
     <div class="icon-picker">${icHtml}</div>
     <div class="form-group">
       <label class="form-label">Nombre</label>
       <input type="text" class="form-input" id="ec-label" value="${c.label}">
     </div>
     <div class="form-group">
       <label class="form-label">Unidad</label>
       <select class="form-input" id="ec-unit">
         ${UNITS.map(u=>`<option value="${u}"${u===c.unit?" selected":""}>${u}</option>`).join("")}
       </select>
     </div>
     <div class="form-group">
       <label class="form-label">Grupo</label>
       <input type="text" class="form-input" id="ec-group" list="glist-edit" value="${c.group||""}">
       <datalist id="glist-edit">${allGroups.map(g=>`<option value="${g}">`).join("")}</datalist>
     </div>
     <div class="btn-row">
       <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
       <button class="btn-primary" onclick="doEditCat('${id}')">Guardar</button>
     </div>`);
}

function doEditCat(id){
  const label=document.getElementById("ec-label").value.trim();
  const unit =document.getElementById("ec-unit").value;
  const icon =document.getElementById("ec-icon").value;
  const group=document.getElementById("ec-group").value.trim()||"Sin grupo";
  if(!label){ showToast("⚠️ Escribe un nombre",true); return; }
  const idx=categories.findIndex(c=>c.id===id); if(idx===-1) return;
  categories[idx]={...categories[idx],label,unit,icon,group};
  saveCats(); closeModal(); showToast("✅ Categoría actualizada");
  renderCats(document.getElementById("body"));
}

function deleteCat(id){
  openModal("¿Eliminar categoría?","Los registros existentes no se verán afectados.",
    `<div class="btn-row">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary btn-danger" onclick="doCatDelete('${id}')">Eliminar</button>
    </div>`);
}
function doCatDelete(id){
  categories=categories.filter(c=>c.id!==id); saveCats(); closeModal();
  showToast("🗑 Categoría eliminada",true);
  renderCats(document.getElementById("body"));
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
document.getElementById("header-sub").textContent=
  new Date().toLocaleDateString("es-MX",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
render();
</script>
</body>
</html>
