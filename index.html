<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2D4A38">
<title>Medidas Diarias</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --green-dark: #2D4A38;
    --green-mid: #4A7A5A;
    --green-light: #6B9E78;
    --green-pale: #E8F0EB;
    --cream: #F7F3ED;
    --cream2: #EDE8E0;
    --sand: #D9D0C3;
    --brown: #7A6B5A;
    --dark: #2A2420;
    --red: #C0675A;
    --white: #FFFFFF;
    --radius: 16px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
  }
  html, body { height: 100%; background: var(--cream); font-family: 'Nunito', sans-serif; color: var(--dark); overflow: hidden; }
  body { display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; position: relative; }

  /* ── HEADER ── */
  #header {
    background: var(--green-dark);
    padding: env(safe-area-inset-top, 0) 0 0;
    flex-shrink: 0;
    position: relative;
  }
  #header-inner { padding: 16px 20px 14px; display: flex; align-items: center; justify-content: space-between; }
  #header-title { font-family: 'Playfair Display', serif; font-size: 22px; color: #E8F4EC; font-weight: 700; }
  #header-sub { font-size: 12px; color: #90B89A; margin-top: 2px; text-transform: capitalize; }
  #btn-add-header {
    background: var(--green-light); color: white; border: none;
    border-radius: 22px; padding: 10px 18px; font-size: 14px;
    font-weight: 800; font-family: 'Nunito', sans-serif;
    display: flex; align-items: center; gap: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  /* ── NAV ── */
  #nav {
    background: #223830;
    display: flex;
    padding: 6px 12px 8px;
    gap: 4px;
    flex-shrink: 0;
  }
  .nav-btn {
    flex: 1; background: transparent; border: none; color: #7A9E85;
    padding: 9px 4px; border-radius: 12px; font-size: 13px;
    font-weight: 700; font-family: 'Nunito', sans-serif; transition: all 0.18s;
  }
  .nav-btn.active { background: var(--green-dark); color: #E8F4EC; }

  /* ── BODY ── */
  #body {
    flex: 1; overflow-y: auto; padding: 16px 14px 100px;
    -webkit-overflow-scrolling: touch;
  }

  /* ── SECTION TITLE ── */
  .sec-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px; color: var(--green-dark); font-weight: 700;
    margin-bottom: 14px;
  }

  /* ── DATE BAR ── */
  #date-bar {
    display: flex; align-items: center; gap: 8px;
    background: var(--cream2); border-radius: 14px;
    padding: 10px 14px; margin-bottom: 16px;
  }
  #date-bar label { font-size: 12px; font-weight: 800; color: var(--brown); text-transform: uppercase; letter-spacing: 0.6px; white-space: nowrap; }
  #date-bar input[type=date] { border: none; background: transparent; font-size: 14px; color: var(--dark); font-family: 'Nunito', sans-serif; flex: 1; outline: none; }

  /* ── ENTRY CARD ── */
  .entry-card {
    background: var(--white); border-radius: var(--radius);
    padding: 14px 14px; margin-bottom: 10px;
    box-shadow: var(--shadow); display: flex; align-items: center; gap: 12px;
    transition: transform 0.15s;
    animation: slideUp 0.25s ease both;
  }
  .icon-bubble {
    width: 44px; height: 44px; border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .entry-info { flex: 1; min-width: 0; }
  .entry-label { font-weight: 800; font-size: 14px; color: var(--dark); }
  .entry-note { font-size: 12px; color: #A09080; margin-top: 2px; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-right { text-align: right; flex-shrink: 0; }
  .entry-value { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--green-dark); font-weight: 700; }
  .entry-unit { font-size: 12px; color: #A09080; }
  .entry-time { font-size: 11px; color: #B0A090; margin-top: 2px; }
  .btn-del {
    background: none; border: none; color: #D4C8BE; font-size: 18px;
    padding: 6px; flex-shrink: 0; line-height: 1;
  }

  /* ── EMPTY ── */
  .empty { text-align: center; padding: 60px 20px; }
  .empty .empty-icon { font-size: 52px; margin-bottom: 12px; }
  .empty .empty-title { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--brown); margin-bottom: 6px; }
  .empty .empty-sub { font-size: 13px; color: #B0A090; line-height: 1.6; }

  /* ── FORM ── */
  .form-label {
    font-size: 12px; font-weight: 800; color: var(--brown);
    text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; display: block;
  }
  .form-input {
    width: 100%; padding: 14px 16px;
    border: 1.5px solid var(--cream2); border-radius: 14px;
    font-size: 16px; color: var(--dark); background: var(--white);
    font-family: 'Nunito', sans-serif; outline: none; transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--green-mid); box-shadow: 0 0 0 3px rgba(74,122,90,0.12); }
  .form-group { margin-bottom: 16px; }
  textarea.form-input { resize: none; }

  /* ── CATEGORY GRID ── */
  #cat-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; margin-bottom: 4px;
  }
  .cat-chip {
    display: flex; flex-direction: column; align-items: center;
    gap: 4px; padding: 10px 6px; border-radius: 13px;
    border: 2px solid transparent; font-family: 'Nunito', sans-serif;
    font-weight: 700; text-align: center; transition: all 0.18s;
    cursor: pointer; background: var(--cream2); color: var(--brown);
    min-height: 70px; justify-content: center;
  }
  .cat-chip .chip-icon { font-size: 20px; }
  .cat-chip .chip-label { font-size: 11px; line-height: 1.2; }
  .cat-chip .chip-unit { font-size: 10px; opacity: 0.75; }
  .cat-chip.selected { color: white; border-color: transparent; }
  .cat-chip-add {
    background: var(--cream2) !important;
    border: 2px dashed var(--sand) !important;
    color: var(--brown) !important;
  }

  /* ── BUTTONS ── */
  .btn-row { display: flex; gap: 10px; margin-top: 22px; }
  .btn-primary {
    flex: 1; background: var(--green-dark); color: white;
    border: none; border-radius: 14px; padding: 15px;
    font-size: 16px; font-weight: 800; font-family: 'Nunito', sans-serif;
    transition: opacity 0.2s;
  }
  .btn-primary:disabled { opacity: 0.45; }
  .btn-secondary {
    flex: 1; background: var(--cream2); color: var(--brown);
    border: none; border-radius: 14px; padding: 15px;
    font-size: 15px; font-weight: 700; font-family: 'Nunito', sans-serif;
  }
  .btn-danger { background: var(--red) !important; }

  /* ── HISTORY ── */
  .day-block {
    background: var(--white); border-radius: var(--radius);
    margin-bottom: 10px; box-shadow: var(--shadow);
    overflow: hidden;
  }
  .day-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; cursor: pointer;
  }
  .day-title { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--green-dark); font-weight: 700; text-transform: capitalize; }
  .day-count { font-size: 12px; color: #A09080; margin-top: 2px; }
  .day-chips { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; max-width: 55%; }
  .mini-chip { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 700; }
  .day-entries { padding: 0 10px 10px; display: none; }
  .day-entries.open { display: block; }
  .day-sub-entry {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 6px; border-bottom: 1px solid var(--cream2);
  }
  .day-sub-entry:last-child { border-bottom: none; }

  /* ── SUMMARY ── */
  #summary-txt {
    width: 100%; font-family: monospace; font-size: 12px;
    line-height: 1.7; color: var(--dark); background: var(--cream);
    border: 1.5px solid var(--sand); border-radius: 14px;
    padding: 14px; resize: none;
    -webkit-user-select: all; user-select: all;
  }
  .btn-copy {
    width: 100%; background: var(--green-dark); color: white;
    border: none; border-radius: 14px; padding: 15px;
    font-size: 16px; font-weight: 800; font-family: 'Nunito', sans-serif;
    margin-top: 12px;
  }

  /* ── MODAL ── */
  #overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: none; align-items: center; justify-content: center;
    z-index: 200; padding: 24px;
  }
  #overlay.open { display: flex; }
  #modal {
    background: var(--white); border-radius: 22px;
    padding: 28px 22px; width: 100%; max-width: 360px;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.25s ease both;
  }
  #modal-title { font-family: 'Playfair Display', serif; font-size: 19px; color: var(--dark); margin-bottom: 8px; }
  #modal-sub { font-size: 13px; color: var(--brown); margin-bottom: 22px; line-height: 1.5; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--green-dark); color: white;
    padding: 13px 24px; border-radius: 24px;
    font-size: 14px; font-weight: 700; font-family: 'Nunito', sans-serif;
    z-index: 300; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
    opacity: 0; white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ── ICON PICKER ── */
  #icon-picker { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .icon-opt {
    width: 44px; height: 44px; border-radius: 11px; border: 2px solid transparent;
    background: var(--cream2); font-size: 22px; cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .icon-opt.sel { border-color: var(--green-mid); background: var(--green-pale); }

  /* ── CAT MANAGE LIST ── */
  .cat-manage-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid var(--cream2);
  }
  .cat-manage-item:last-child { border-bottom: none; }

  /* ── DIFF BADGE ── */
  .diff-up { color: var(--red); font-size: 11px; font-weight: 800; }
  .diff-down { color: var(--green-mid); font-size: 11px; font-weight: 800; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── FAB ── */
  #fab {
    position: fixed; bottom: calc(20px + env(safe-area-inset-bottom, 0px));
    right: 20px; width: 58px; height: 58px; border-radius: 50%;
    background: var(--green-light); color: white; border: none;
    font-size: 28px; font-weight: 300; box-shadow: 0 4px 18px rgba(74,122,90,0.5);
    display: none; align-items: center; justify-content: center;
    z-index: 50; transition: transform 0.15s;
  }
  #fab:active { transform: scale(0.92); }

  select.form-input { appearance: auto; -webkit-appearance: auto; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div id="header-inner">
    <div>
      <div id="header-title">📏 Mis Medidas</div>
      <div id="header-sub"></div>
    </div>
    <button id="btn-add-header" onclick="showView('add')">＋ Registrar</button>
  </div>
</div>

<!-- NAV -->
<div id="nav">
  <button class="nav-btn active" onclick="showView('home')" data-view="home">📋 Hoy</button>
  <button class="nav-btn" onclick="showView('history')" data-view="history">📅 Historial</button>
  <button class="nav-btn" onclick="showView('summary')" data-view="summary">📤 Resumen</button>
  <button class="nav-btn" onclick="showView('cats')" data-view="cats">⚙️ Categorías</button>
</div>

<!-- BODY -->
<div id="body"></div>

<!-- OVERLAY / MODAL -->
<div id="overlay" onclick="closeModal()">
  <div id="modal" onclick="event.stopPropagation()">
    <div id="modal-title"></div>
    <div id="modal-sub"></div>
    <div id="modal-content"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- FAB -->
<button id="fab" onclick="showView('add')">＋</button>

<script>
// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────
const DEFAULT_CATS = [
  { id:"peso",          label:"Peso",            unit:"kg",  icon:"⚖️",  color:"#5A8A6A" },
  { id:"cuello",        label:"Cuello",          unit:"cm",  icon:"📏",  color:"#7A8A9A" },
  { id:"hombros",       label:"Hombros",         unit:"cm",  icon:"📐",  color:"#7B8FA1" },
  { id:"pecho",         label:"Pecho / Busto",   unit:"cm",  icon:"💪",  color:"#A0785A" },
  { id:"cintura",       label:"Cintura",         unit:"cm",  icon:"🎯",  color:"#C67B5C" },
  { id:"cadera",        label:"Cadera",          unit:"cm",  icon:"📊",  color:"#9B7B9B" },
  { id:"bicep_d",       label:"Bícep Der.",      unit:"cm",  icon:"💪",  color:"#5A8A7A" },
  { id:"bicep_i",       label:"Bícep Izq.",      unit:"cm",  icon:"💪",  color:"#5A8A7A" },
  { id:"muslo_d",       label:"Muslo Der.",      unit:"cm",  icon:"🦵",  color:"#A08B6B" },
  { id:"muslo_i",       label:"Muslo Izq.",      unit:"cm",  icon:"🦵",  color:"#A08B6B" },
  { id:"pantorrilla_d", label:"Pantorrilla Der.", unit:"cm", icon:"🦵",  color:"#6B9B7B" },
  { id:"pantorrilla_i", label:"Pantorrilla Izq.", unit:"cm", icon:"🦵",  color:"#6B9B7B" },
  { id:"grasa",         label:"% Grasa Corporal", unit:"%",  icon:"📉",  color:"#C4956A" },
];
const UNITS = ["kg","lb","cm","in","%","g","L","ml"];
const ICONS = ["📏","⚖️","💪","🦵","🎯","📊","📐","📉","❤️","🔵","🟢","⭕","🏃","🧘","🍎","💊","🩺","🌡️","🔴","⭐"];

let categories = JSON.parse(localStorage.getItem("mdc_cats") || "null") || DEFAULT_CATS;
let entries    = JSON.parse(localStorage.getItem("mdc_entries") || "{}");

function saveCats()    { localStorage.setItem("mdc_cats",    JSON.stringify(categories)); }
function saveEntries() { localStorage.setItem("mdc_entries", JSON.stringify(entries)); }

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function today()  { return dateKey(new Date()); }
function dateKey(d){ return d.toISOString().split("T")[0]; }
function fmtDate(s){
  const d = new Date(s + "T12:00:00");
  return d.toLocaleDateString("es-MX",{weekday:"long",day:"numeric",month:"long"});
}
function fmtDateShort(s){
  const d = new Date(s + "T12:00:00");
  return d.toLocaleDateString("es-MX",{day:"numeric",month:"short"});
}
function timeNow(){
  return new Date().toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"});
}
function cat(id){ return categories.find(c=>c.id===id)||{}; }
function allDays(){ return Object.keys(entries).sort((a,b)=>b.localeCompare(a)); }

// ─────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────
let toastTimer;
function showToast(msg, danger=false){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.background = danger ? "#C0675A" : "#2D4A38";
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove("show"), 2400);
}

// ─────────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────────
function openModal(title, sub, html, buttons){
  document.getElementById("modal-title").textContent = title;
  document.getElementById("modal-sub").textContent   = sub;
  document.getElementById("modal-content").innerHTML = html + (buttons||"");
  document.getElementById("overlay").classList.add("open");
}
function closeModal(){ document.getElementById("overlay").classList.remove("open"); }

// ─────────────────────────────────────────────
// VIEWS
// ─────────────────────────────────────────────
let currentView = "home";
let selectedDate = today();
let addState = { catId: "", value: "", note: "" };
let newCatState = { icon: "📏", label: "", unit: "cm" };

function showView(v){
  currentView = v;
  document.querySelectorAll(".nav-btn").forEach(b=>{
    b.classList.toggle("active", b.dataset.view === v);
  });
  render();
}

function render(){
  const body = document.getElementById("body");
  body.innerHTML = "";
  if(currentView === "home")    renderHome(body);
  else if(currentView === "add")     renderAdd(body);
  else if(currentView === "history") renderHistory(body);
  else if(currentView === "summary") renderSummary(body);
  else if(currentView === "cats")    renderCats(body);
}

// ── HOME ─────────────────────────────────────
function renderHome(el){
  // date bar
  const max = today();
  el.innerHTML = `
    <div id="date-bar">
      <label>📅 Día:</label>
      <input type="date" id="date-pick" value="${selectedDate}" max="${max}">
    </div>
    <div id="home-entries"></div>
  `;
  document.getElementById("date-pick").addEventListener("change", function(){
    selectedDate = this.value; renderHomeEntries();
  });
  renderHomeEntries();
}

function renderHomeEntries(){
  const cont = document.getElementById("home-entries");
  if(!cont) return;
  const list = entries[selectedDate] || [];
  if(list.length === 0){
    cont.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📏</div>
        <div class="empty-title">Sin registros este día</div>
        <div class="empty-sub">Presiona <b>+ Registrar</b> para agregar tus medidas</div>
      </div>`;
    return;
  }
  let html = `<div class="sec-title">${list.length} medida${list.length!==1?"s":""} registrada${list.length!==1?"s":""}</div>`;
  list.forEach(e=>{
    const c = cat(e.catId);
    const col = c.color || "#888";
    html += `
      <div class="entry-card">
        <div class="icon-bubble" style="background:${col}22;color:${col}">${e.icon}</div>
        <div class="entry-info">
          <div class="entry-label">${e.label}</div>
          ${e.note ? `<div class="entry-note">${e.note}</div>` : ""}
        </div>
        <div class="entry-right">
          <div class="entry-value">${e.value} <span class="entry-unit">${e.unit}</span></div>
          <div class="entry-time">${e.time}</div>
        </div>
        <button class="btn-del" onclick="confirmDelete('${selectedDate}',${e.id})">✕</button>
      </div>`;
  });
  cont.innerHTML = html;
}

function confirmDelete(day, id){
  openModal(
    "¿Eliminar registro?",
    "Esta acción no se puede deshacer.",
    "",
    `<div class="btn-row">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary btn-danger" onclick="deleteEntry('${day}',${id})">Eliminar</button>
    </div>`
  );
}

function deleteEntry(day, id){
  entries[day] = (entries[day]||[]).filter(e=>e.id!==id);
  if(entries[day].length===0) delete entries[day];
  saveEntries();
  closeModal();
  renderHomeEntries();
  showToast("🗑 Entrada eliminada", true);
}

// ── ADD ──────────────────────────────────────
function renderAdd(el){
  addState = { catId:"", value:"", note:"" };
  let html = `<div class="sec-title">Nueva Medida</div>`;
  html += `<label class="form-label">Parte del cuerpo</label>`;
  html += `<div id="cat-grid">`;
  categories.forEach(c=>{
    html += `<button class="cat-chip" data-id="${c.id}" onclick="selectCat('${c.id}')" style="background:${c.color}22;color:${c.color}">
      <span class="chip-icon">${c.icon}</span>
      <span class="chip-label">${c.label}</span>
      <span class="chip-unit">${c.unit}</span>
    </button>`;
  });
  html += `</div>`;
  html += `<div id="add-value-area" style="display:none;margin-top:18px">
    <div class="form-group">
      <label class="form-label" id="val-label">Valor</label>
      <input type="number" class="form-input" id="inp-value" placeholder="Ej. 75.5" step="0.1" min="0" oninput="addState.value=this.value">
    </div>
    <div class="form-group">
      <label class="form-label">Nota (opcional)</label>
      <textarea class="form-input" id="inp-note" rows="2" placeholder="Ej. En ayunas, después de entrenar..." oninput="addState.note=this.value"></textarea>
    </div>
    <div style="font-size:12px;color:#A09080;margin-top:-8px">🕐 Hora registrada automáticamente</div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="showView('home')">Cancelar</button>
      <button class="btn-primary" id="btn-save-entry" onclick="saveEntry()" disabled>Guardar</button>
    </div>
  </div>`;
  el.innerHTML = html;
  document.getElementById("inp-value") && document.getElementById("inp-value").addEventListener("input", function(){
    document.getElementById("btn-save-entry").disabled = !this.value;
  });
}

function selectCat(id){
  addState.catId = id;
  document.querySelectorAll(".cat-chip").forEach(b=>{
    const c = cat(b.dataset.id);
    const sel = b.dataset.id === id;
    b.style.background = sel ? (c.color||"#888") : (c.color||"#888")+"22";
    b.style.color = sel ? "white" : (c.color||"#888");
    b.style.transform = sel ? "scale(1.04)" : "scale(1)";
  });
  const c = cat(id);
  document.getElementById("val-label").textContent = `Valor (${c.unit})`;
  document.getElementById("add-value-area").style.display = "block";
  document.getElementById("inp-value").focus();
}

function saveEntry(){
  if(!addState.catId || !addState.value) return;
  const c = cat(addState.catId);
  const entry = {
    id: Date.now(),
    catId: addState.catId,
    label: c.label,
    icon: c.icon,
    color: c.color,
    value: parseFloat(addState.value),
    unit: c.unit,
    note: addState.note.trim(),
    time: timeNow(),
    ts: new Date().toISOString(),
  };
  const day = today();
  if(!entries[day]) entries[day] = [];
  entries[day].push(entry);
  saveEntries();
  selectedDate = day;
  showView("home");
  showToast("✅ Medida guardada");
}

// ── HISTORY ──────────────────────────────────
function renderHistory(el){
  const days = allDays();
  let html = `<div class="sec-title">Historial</div>`;
  if(days.length===0){
    html += `<div class="empty"><div class="empty-icon">📅</div><div class="empty-title">Sin registros aún</div><div class="empty-sub">Comienza registrando tus medidas de hoy</div></div>`;
  } else {
    days.forEach(day=>{
      const list = entries[day]||[];
      const chips = list.slice(0,4).map(e=>{
        const col = cat(e.catId).color||"#888";
        return `<span class="mini-chip" style="background:${col}22;color:${col}">${e.icon}${e.value}${e.unit}</span>`;
      }).join("");
      const extra = list.length>4 ? `<span class="mini-chip" style="background:#EDE8E0;color:#7A6B5A">+${list.length-4}</span>`:"";
      html += `
        <div class="day-block">
          <div class="day-header" onclick="toggleDay('${day}')">
            <div>
              <div class="day-title">${fmtDate(day)}</div>
              <div class="day-count">${list.length} medida${list.length!==1?"s":""}</div>
            </div>
            <div class="day-chips">${chips}${extra}</div>
          </div>
          <div class="day-entries" id="day-${day}">
            ${list.map(e=>{
              const col = cat(e.catId).color||"#888";
              return `<div class="day-sub-entry">
                <span style="font-size:20px">${e.icon}</span>
                <span style="flex:1;font-size:13px;font-weight:700;color:var(--dark)">${e.label}</span>
                <span style="font-family:'Playfair Display',serif;font-size:16px;color:var(--green-dark);font-weight:700">${e.value} <span style="font-size:11px;color:#A09080">${e.unit}</span></span>
                <span style="font-size:11px;color:#B0A090;margin-left:6px">${e.time}</span>
                <button class="btn-del" onclick="confirmDelete('${day}',${e.id})" style="font-size:15px">✕</button>
              </div>`;
            }).join("")}
          </div>
        </div>`;
    });
  }
  el.innerHTML = html;
}

function toggleDay(day){
  const el = document.getElementById("day-"+day);
  if(el) el.classList.toggle("open");
}

// ── SUMMARY ──────────────────────────────────
function renderSummary(el){
  const days = allDays();
  let txt = "📋 DIARIO DE MEDIDAS\n";
  txt += `Exportado: ${new Date().toLocaleDateString("es-MX",{day:"numeric",month:"long",year:"numeric"})}\n`;
  txt += "─".repeat(36) + "\n\n";
  if(days.length===0){
    txt += "(Sin registros aún)\n";
  } else {
    days.forEach(day=>{
      txt += `📅 ${fmtDate(day).toUpperCase()}\n`;
      (entries[day]||[]).forEach(e=>{
        txt += `  ${e.icon} ${e.label}: ${e.value} ${e.unit}`;
        if(e.note) txt += `  — ${e.note}`;
        txt += `  (${e.time})\n`;
      });
      txt += "\n";
    });
  }

  let html = `<div class="sec-title">Resumen para Nutriólogo</div>`;
  html += `<p style="font-size:13px;color:var(--brown);margin-bottom:12px;line-height:1.6">Copia este texto y envíalo a tu nutriólogo por WhatsApp, correo o mensaje.</p>`;
  html += `<textarea id="summary-txt" rows="14">${txt}</textarea>`;
  html += `<button class="btn-copy" onclick="copySummary()">📋 Copiar al portapapeles</button>`;

  // Latest per category
  if(days.length > 0){
    html += `<div class="sec-title" style="margin-top:26px">Última medida por categoría</div>`;
    categories.forEach(c=>{
      const allE = days.flatMap(d=>(entries[d]||[]).filter(e=>e.catId===c.id)).sort((a,b)=>new Date(b.ts)-new Date(a.ts));
      if(!allE.length) return;
      const latest = allE[0];
      const prev   = allE[1];
      const diff   = prev ? (latest.value - prev.value) : null;
      const diffHtml = diff!==null
        ? `<span class="${diff<0?"diff-down":diff>0?"diff-up":""}">${diff>0?"▲":diff<0?"▼":"—"} ${Math.abs(diff).toFixed(1)} ${latest.unit}</span>`
        : "";
      html += `
        <div class="entry-card" style="margin-bottom:8px">
          <div class="icon-bubble" style="background:${c.color}22;color:${c.color}">${c.icon}</div>
          <div class="entry-info">
            <div class="entry-label">${c.label}</div>
            <div class="entry-note">${fmtDateShort(dateKey(new Date(latest.ts)))} · ${latest.time}</div>
          </div>
          <div class="entry-right">
            <div class="entry-value">${latest.value} <span class="entry-unit">${latest.unit}</span></div>
            ${diffHtml}
          </div>
        </div>`;
    });
  }

  el.innerHTML = html;
}

function copySummary(){
  const txt = document.getElementById("summary-txt");
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt.value).then(()=>showToast("📋 Copiado al portapapeles"));
  } else {
    txt.select();
    document.execCommand("copy");
    showToast("📋 Copiado al portapapeles");
  }
}

// ── CATS MANAGER ─────────────────────────────
function renderCats(el){
  let html = `<div class="sec-title">Gestionar Categorías</div>`;

  // List existing cats
  html += `<div style="background:var(--white);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;box-shadow:var(--shadow)">`;
  categories.forEach((c)=>{
    html += `<div class="cat-manage-item">
      <span style="font-size:22px">${c.icon}</span>
      <div style="flex:1">
        <div style="font-weight:800;font-size:14px;color:var(--dark)">${c.label}</div>
        <div style="font-size:11px;color:#A09080">${c.unit}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <button onclick="editCat('${c.id}')" style="background:var(--green-pale);border:none;border-radius:10px;padding:6px 10px;font-size:13px;font-weight:700;color:var(--green-dark);font-family:'Nunito',sans-serif">✏️ Editar</button>
        <button class="btn-del" onclick="deleteCat('${c.id}')" style="color:var(--red);font-size:20px">🗑</button>
      </div>
    </div>`;
  });
  html += `</div>`;

  // New category form
  html += `<div class="sec-title">Crear nueva categoría</div>`;
  html += `<div style="background:var(--white);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)">`;
  html += `<label class="form-label">Ícono</label>`;
  html += `<div id="icon-picker">`;
  ICONS.forEach(ic=>{
    html += `<button class="icon-opt${newCatState.icon===ic?" sel":""}" onclick="pickIcon('${ic}')">${ic}</button>`;
  });
  html += `</div>`;
  html += `<div class="form-group">
    <label class="form-label">Nombre</label>
    <input type="text" class="form-input" id="nc-label" placeholder="Ej. Antebrazo derecho" value="${newCatState.label}" oninput="newCatState.label=this.value">
  </div>`;
  html += `<div class="form-group">
    <label class="form-label">Unidad</label>
    <select class="form-input" id="nc-unit" onchange="newCatState.unit=this.value">
      ${UNITS.map(u=>`<option value="${u}"${u===newCatState.unit?" selected":""}>${u}</option>`).join("")}
    </select>
  </div>`;
  html += `<button class="btn-primary" onclick="addCat()" style="width:100%;margin-top:4px">Crear categoría</button>`;
  html += `</div>`;

  el.innerHTML = html;
}

function pickIcon(ic){
  newCatState.icon = ic;
  document.querySelectorAll(".icon-opt").forEach(b=>{
    b.classList.toggle("sel", b.textContent===ic);
  });
}

function addCat(){
  const label = (document.getElementById("nc-label")||{}).value || newCatState.label;
  if(!label.trim()){ showToast("⚠️ Escribe un nombre",true); return; }
  const unit = (document.getElementById("nc-unit")||{}).value || newCatState.unit;
  const colors = ["#5A8A6A","#7A8A9A","#A08B6B","#9B7B9B","#C4956A","#7B8FA1","#C67B5C"];
  const color  = colors[categories.length % colors.length];
  const c = { id:`c_${Date.now()}`, label:label.trim(), unit, icon:newCatState.icon, color };
  categories.push(c);
  saveCats();
  newCatState = { icon:"📏", label:"", unit:"cm" };
  showToast("✅ Categoría creada");
  renderCats(document.getElementById("body"));
}

function editCat(id){
  const c = categories.find(x=>x.id===id);
  if(!c) return;
  const iconsHtml = ICONS.map(ic=>
    `<button class="icon-opt${c.icon===ic?" sel":""}" onclick="this.parentNode.querySelectorAll('.icon-opt').forEach(b=>b.classList.remove('sel'));this.classList.add('sel');document.getElementById('ec-icon').value='${ic}'">${ic}</button>`
  ).join("");
  openModal(
    `Editar: ${c.label}`,
    "Cambia el ícono, nombre o unidad.",
    `<input type="hidden" id="ec-icon" value="${c.icon}">
     <label class="form-label" style="display:block;margin-bottom:6px">Ícono</label>
     <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px">${iconsHtml}</div>
     <div class="form-group">
       <label class="form-label">Nombre</label>
       <input type="text" class="form-input" id="ec-label" value="${c.label}">
     </div>
     <div class="form-group">
       <label class="form-label">Unidad</label>
       <select class="form-input" id="ec-unit">
         ${UNITS.map(u=>`<option value="${u}"${u===c.unit?" selected":""}>${u}</option>`).join("")}
       </select>
     </div>`,
    `<div class="btn-row">
       <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
       <button class="btn-primary" onclick="doEditCat('${id}')">Guardar</button>
     </div>`
  );
}

function doEditCat(id){
  const label = document.getElementById("ec-label").value.trim();
  const unit  = document.getElementById("ec-unit").value;
  const icon  = document.getElementById("ec-icon").value;
  if(!label){ showToast("⚠️ Escribe un nombre", true); return; }
  const idx = categories.findIndex(c=>c.id===id);
  if(idx===-1) return;
  categories[idx] = { ...categories[idx], label, unit, icon };
  saveCats();
  closeModal();
  showToast("✅ Categoría actualizada");
  renderCats(document.getElementById("body"));
}

function deleteCat(id){
  openModal(
    "¿Eliminar categoría?",
    "Se eliminará la categoría pero los registros existentes se conservarán.",
    "",
    `<div class="btn-row">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary btn-danger" onclick="doCatDelete('${id}')">Eliminar</button>
    </div>`
  );
}

function doCatDelete(id){
  categories = categories.filter(c=>c.id!==id);
  saveCats();
  closeModal();
  showToast("🗑 Categoría eliminada", true);
  renderCats(document.getElementById("body"));
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
document.getElementById("header-sub").textContent =
  new Date().toLocaleDateString("es-MX",{weekday:"long",year:"numeric",month:"long",day:"numeric"});

render();
</script>
</body>
</html>
